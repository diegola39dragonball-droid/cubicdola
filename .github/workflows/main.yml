name: Compilar CubicDola
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
    - name: Descomprimir
      run: unzip CubicChunks-MC_1.12.zip -d .
    - name: Permisos
      run: chmod +x gradlew
    - name: Fabricar Mod
      run: ./gradlew build
    - name: Guardar Jar
      uses: actions/upload-artifact@v4
      with:
        name: CubicDola-Mod
        path: build/libs/*.jar
        
