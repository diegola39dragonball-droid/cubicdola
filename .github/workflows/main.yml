name: Compilar CubicDola
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
    - name: Descomprimir y Mover
      run: |
        unzip *.zip -d temp
        find temp -name "gradlew" -exec cp -r $(dirname {})/. . \;
    - name: Permisos y Fabricar
      run: |
        chmod +x gradlew
        ./gradlew build
    - name: Guardar Mod
      uses: actions/upload-artifact@v4
      with:
        name: CubicDola-Mod
        path: build/libs/*.jar
        
